version: '3.9'

name: task-tracker-api

services:
    api:
        hostname: api
        container_name: api
        image: ghcr.io/task-tracker-lab/backend:dev
        env_file:
            - .env
        ports:
            - '3000:3000'
        depends_on:
            database:
                condition: service_healthy
            redis:
                condition: service_healthy
        networks:
            - backend
        deploy:
            resources:
                limits:
                    cpus: '2.0'
                    memory: 1024M
                reservations:
                    cpus: '0.5'
                    memory: 256M

    database:
        hostname: database
        container_name: database
        image: postgres:16-alpine
        restart: always
        env_file:
            - .env
        environment:
            POSTGRES_USER: ${DB_USERNAME}
            POSTGRES_PASSWORD: ${DB_PASSWORD}
            POSTGRES_DB: ${DB_DATABASE}
        ports:
            - '6000:5432'
        volumes:
            - postgres_data:/var/lib/postgresql/data
        networks:
            - backend
        healthcheck:
            test: [
                    'CMD-SHELL',
                    'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB" -q
                    || exit 1',
                ]
            interval: 5s
            timeout: 5s
            retries: 5
        profiles: ['infra']

    redis:
        hostname: redis
        container_name: redis
        image: redis:7-alpine
        restart: always
        ports:
            - '${REDIS_PORT:-6999}:6379'
        command: redis-server --save 60 1 --loglevel notice
        volumes:
            - redis_data:/data
        networks:
            - backend
        healthcheck:
            test: ['CMD', 'redis-cli', 'ping']
            interval: 5s
            timeout: 3s
            retries: 5
        profiles: ['infra']

    minio:
        hostname: minio
        container_name: minio
        image: minio/minio:latest
        restart: always
        environment:
            MINIO_ROOT_USER: ${S3_ACCESS_KEY}
            MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
        ports:
            - '9000:9000' # API
            - '9001:9001' # Console (UI)
        command: server /data --console-address ":9001"
        volumes:
            - minio_data:/data
        networks:
            - backend
        profiles: ['infra']

    minio-init:
        image: minio/mc:latest
        depends_on:
            - minio
        environment:
            MINIO_ROOT_USER: ${S3_ACCESS_KEY}
            MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
        networks:
            - backend
        profiles: ['infra']
        entrypoint: >
            /bin/sh -c " sleep 5; mc alias set myminio http://minio:9000
            ${S3_ACCESS_KEY} ${S3_SECRET_KEY}; mc mb myminio/${S3_BUCKET_NAME}
            --ignore-existing; mc anonymous set download
            myminio/${S3_BUCKET_NAME}; exit 0; "
    imagor:
        image: shumc/imagor:latest
        container_name: imagor
        restart: always
        environment:
            - IMAGOR_SECRET=${IMAGOR_SECRET:-supersecret}
            - HTTP_LOADER_DISABLE=1

            - AWS_ACCESS_KEY_ID=${S3_ACCESS_KEY}
            - AWS_SECRET_ACCESS_KEY=${S3_SECRET_KEY}
            - AWS_REGION=${S3_REGION}

            - S3_ENDPOINT=${S3_ENDPOINT}
            - S3_FORCE_PATH_STYLE=1

            - S3_LOADER_BUCKET=${S3_BUCKET_NAME}
            - S3_LOADER_BASE_DIR=sources

            - S3_STORAGE_BUCKET=${S3_BUCKET_NAME}
            - S3_STORAGE_BASE_DIR=
            - S3_STORAGE_ACL=private

            - S3_RESULT_STORAGE_BUCKET=${S3_BUCKET_NAME}
            - S3_RESULT_STORAGE_ACL=private

            - VIPS_CONCURRENCY=1
            - DEBUG=1
        ports:
            - '8000:8000'
        depends_on:
            - minio
        networks:
            - backend
        profiles: ['infra']

volumes:
    postgres_data:
    redis_data:
    minio_data:

networks:
    backend:
        name: task-tracker-gateway
