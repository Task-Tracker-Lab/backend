name: CI

on:
    push:
        branches:
            - main
            - dev
            - 'feat/**'
            - 'fix/**'
            - 'refactor/**'
            - 'chore/**'
            - 'perf/**'
            - 'build/**'
            - 'ci/**'
        paths-ignore:
            - '**.md'
            - 'infra/**'
            - '.gitignore'
            - 'docker-compose.yml'

    pull_request:
        branches:
            - main
            - dev
        paths-ignore:
            - '**.md'
            - 'infra/**'
    workflow_dispatch:

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
    quality-check:
        name: Lint & Test
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Install pnpm
              uses: pnpm/action-setup@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: 'pnpm'

            - name: Install dependencies
              run: pnpm install --frozen-lockfile --prefer-offline

            - name: Run Lint
              run: pnpm run lint

            - name: Type Check
              run: pnpm exec tsc --noEmit

            - name: Run Tests
              run: pnpm run test
